<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Variables 2 - LearningPC</title>
    <link rel="stylesheet" href="../../src/css/styles.css">
    <style>
        .simulator-editor { background: var(--bg-secondary); border-radius: 8px; padding: 20px; margin: 20px 0; }
        .step-indicator { background: var(--accent-solid); color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .editor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .explanation { background: var(--bg-primary); padding: 15px; border-radius: 8px; margin-bottom: 15px; line-height: 1.6; }
        .code-editor-wrapper { display: flex; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .line-numbers { background: #2d2d2d; color: #858585; padding: 10px 5px; text-align: right; font-family: monospace; font-size: 14px; line-height: 1.5; user-select: none; }
        .code-editor { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-family: monospace; font-size: 14px; line-height: 1.5; resize: none; outline: none; }
        .editor-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--accent-solid); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-color); }
        .output-panel { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .output-header { background: #2d2d2d; color: #858585; padding: 10px 15px; }
        .code-output { color: #10b981; font-family: monospace; font-size: 14px; padding: 15px; margin: 0; min-height: 200px; overflow: auto; white-space: pre-wrap; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .feedback.success { background: #d1fae5; color: #065f46; }
        .feedback.warning { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tipos de datos</h1>
        <div class="explanation">
            <h2>Tipos en Python</h2>
            <p>Python tiene diferentes <strong>tipos</strong> de datos:</p>
            <ul>
                <li><code>str</code> - Texto (string)</li>
                <li><code>int</code> - N&uacute;mero entero</li>
                <li><code>float</code> - N&uacute;mero decimal</li>
                <li><code>bool</code> - Verdadero o falso</li>
            </ul>
        </div>
        <div id="simulator-container"></div>
        <div class="navigation">
            <button class="btn-nav" onclick="goToLevel('prev')">Anterior</button>
            <button class="btn-nav" onclick="goToLevel('next')">Siguiente</button>
        </div>
    </div>
    <script src="../../src/js/pyodide-loader.js"></script>
    <script src="../../src/js/simulator-editor.js"></script>
    <script>
        const levelConfig = {
            explanation: '<h3>Step 1: String and Integer</h3><p>Create <code>nombre = "Ana"</code> and <code>edad = 25</code></p>',
            initialCode: '# Types\nnombre = "Ana"\nedad = 25\nprint(nombre, edad)\nprint(type(nombre), type(edad))',
            totalSteps: 1, startStep: 1,
            steps: [{ title: 'Types', code: 'nombre = "Ana"\nedad = 25\nprint(nombre)\nprint(type(nombre))', type: 'contains', expected: 'Ana', successMessage: 'Correcto! str is text, int is number', hint: 'name = "text"' }],
            completionMessage: 'Felicitaciones! Tipos de datos completado'
        };
        function onLevelComplete() { }
        function goToLevel(d) { window.location.href = d === 'next' ? 'variables-3.html' : 'variables-1.html'; }
        document.addEventListener('DOMContentLoaded', () => initSimulatorEditor(levelConfig));
    </script>
</body>
</html>
