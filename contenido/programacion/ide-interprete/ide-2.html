<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Interprete - LearningPC</title>
    <link rel="stylesheet" href="../../src/css/styles.css">
    <style>
        .simulator-editor { background: var(--bg-secondary); border-radius: 8px; padding: 20px; margin: 20px 0; }
        .step-indicator { background: var(--accent-solid); color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .editor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .explanation { background: var(--bg-primary); padding: 15px; border-radius: 8px; margin-bottom: 15px; line-height: 1.6; }
        .code-editor-wrapper { display: flex; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .line-numbers { background: #2d2d2d; color: #858585; padding: 10px 5px; text-align: right; font-family: monospace; font-size: 14px; line-height: 1.5; user-select: none; }
        .code-editor { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-family: monospace; font-size: 14px; line-height: 1.5; resize: none; outline: none; }
        .editor-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--elevation-2); }
        .btn-primary { background: var(--accent-solid); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-color); }
        .output-panel { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .output-header { background: #2d2d2d; color: #858585; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-clear { background: transparent; border: none; color: #858585; cursor: pointer; }
        .code-output { color: #10b981; font-family: monospace; font-size: 14px; padding: 15px; margin: 0; min-height: 200px; max-height: 300px; overflow: auto; white-space: pre-wrap; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .feedback.success { background: #d1fae5; color: #065f46; }
        .feedback.error { background: #fee2e2; color: #991b1b; }
        .feedback.warning { background: #fef3c7; color: #92400e; }
        .feedback.info { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nivel 2: El Int&eacute;rprete</h1>
        <div class="explanation">
            <h2>Qu&eacute; es un int&eacute;rprete?</h2>
            <p>El <strong>int&eacute;rprete</strong> es un programa que traduce y ejecuta tu c&oacute;digo Python.</p>
            <p>Sin &eacute;l, tu computadora no entender&iacute;a las instrucciones que escribes.</p>
        </div>
        <div id="simulator-container"></div>
        <div class="navigation">
            <button class="btn-nav" onclick="goToLevel('prev')">Anterior</button>
            <button class="btn-nav" onclick="goToLevel('next')">Siguiente</button>
        </div>
    </div>
    <script src="../../src/js/pyodide-loader.js"></script>
    <script src="../../src/js/simulator-editor.js"></script>
    <script>
        const levelConfig = {
            explanation: '<h3>Paso 1</h3><p>Crea una variable <code>x = 5</code> y luego impr&iacute;mela con <code>print(x)</code></p>',
            initialCode: '# Crea una variable\nx = 5\nprint(x)',
            totalSteps: 1, startStep: 1,
            steps: [{ title: 'Ejecutar variable', code: 'x = 5\nprint(x)', type: 'exact', expected: '5', successMessage: 'Correcto! Una variable guarda un valor.', hint: 'Usa print(x) para mostrar el valor' }],
            completionMessage: 'Felicitaciones! Has completado Nivel 2'
        };
        function onLevelComplete() { }
        function goToLevel(d) { window.location.href = d === 'next' ? 'ide-3.html' : 'ide-1.html'; }
        document.addEventListener('DOMContentLoaded', () => initSimulatorEditor(levelConfig));
    </script>
</body>
</html>
