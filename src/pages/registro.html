<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning PC – Registro</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        /* Estilos específicos para login/registro - Fluent Design */
        :root {
            --login-bg: #f3f3f3;
            --login-card: #ffffff;
            --login-accent: #0078d4;
            --login-text: #1a1a1a;
            --login-text-secondary: #5c5c5c;
            --login-border: #e5e5e5;
            --login-input-bg: #ffffff;
            --login-input-border: #8c8c8c;
            --login-error: #c42b1c;
            --login-success: #107c10;
        }

        [data-theme="dark"] {
            --login-bg: #1f1f1f;
            --login-card: #2d2d2d;
            --login-accent: #60cdff;
            --login-text: #ffffff;
            --login-text-secondary: #a0a0a0;
            --login-border: #3d3d3d;
            --login-input-bg: #1a1a1a;
            --login-input-border: #5c5c5c;
            --login-error: #ff6b6b;
            --login-success: #6ccb5f;
        }

        * {
            border-radius: 4px !important;
        }

        body {
            background: var(--login-bg);
            font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #registro-container {
            background: var(--login-card);
            padding: 40px 48px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            position: relative;
        }

        #registro-container h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--login-accent);
            margin: 0 0 4px 0;
            text-align: center;
            letter-spacing: -0.5px;
        }

        #registro-container h2 {
            font-size: 14px;
            font-weight: 400;
            color: var(--login-text-secondary);
            margin: 0 0 28px 0;
            text-align: center;
        }

        #form-registro {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #form-registro label {
            font-size: 14px;
            font-weight: 600;
            color: var(--login-text);
            margin-bottom: 4px;
            display: block;
        }

        #form-registro input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            background: var(--login-input-bg);
            border: 1px solid var(--login-input-border);
            border-radius: 4px;
            color: var(--login-text);
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #form-registro input:focus {
            outline: none;
            border-color: var(--login-accent);
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
        }

        #form-registro input::placeholder {
            color: var(--login-text-secondary);
            opacity: 0.7;
        }

        #error-registro {
            font-size: 13px;
            padding: 10px 12px;
            background: rgba(196, 43, 28, 0.1);
            border-left: 3px solid var(--login-error);
            color: var(--login-error);
            display: none;
        }

        #error-registro.visible {
            display: block;
        }

        #exito-registro {
            font-size: 13px;
            padding: 10px 12px;
            background: rgba(16, 124, 16, 0.1);
            border-left: 3px solid var(--login-success);
            color: var(--login-success);
            display: none;
        }

        #exito-registro.visible {
            display: block;
        }

        #btn-registro {
            width: 100%;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            background: var(--login-accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, transform 0.1s;
        }

        #btn-registro:hover {
            filter: brightness(1.1);
        }

        #btn-registro:active {
            transform: scale(0.98);
        }

        #registro-container > p {
            font-size: 13px;
            text-align: center;
            color: var(--login-text-secondary);
            margin-top: 24px;
        }

        #registro-container > p a {
            color: var(--login-accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        #registro-container > p a:hover {
            text-decoration: underline;
        }

        /* Botón theme - estilo Fluent */
        #btn-toggle-theme {
            position: absolute !important;
            top: 16px !important;
            right: 16px !important;
            background: transparent !important;
            border: 1px solid var(--login-border) !important;
            color: var(--login-text-secondary) !important;
            padding: 8px !important;
            cursor: pointer !important;
            border-radius: 6px !important;
            transition: all 0.15s !important;
            z-index: 100 !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-toggle-theme:hover {
            background: var(--login-border) !important;
            color: var(--login-text) !important;
        }

        /* Eliminar pseudo-elementos que ya no se usan */
        #btn-toggle-theme::before,
        [data-theme="dark"] #btn-toggle-theme::before {
            display: none !important;
        }

        [data-theme="dark"] #btn-toggle-theme {
            background: transparent !important;
            border: 1px solid var(--login-border) !important;
            color: var(--login-text-secondary) !important;
        }

        [data-theme="dark"] #btn-toggle-theme:hover {
            background: var(--login-border) !important;
            color: var(--login-text) !important;
        }

        /* Responsive */
        @media (max-width: 440px) {
            #registro-container {
                padding: 32px 24px;
                margin: 16px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            }
        }
    </style>
</head>
<body>
    <main id="registro-container">
        <button id="btn-toggle-theme" title="Cambiar tema">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        </button>
        
        <h1>Learning PC</h1>
        <h2>Crear cuenta</h2>

        <form id="form-registro">
            <div>
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Elige un nombre de usuario" required />
            </div>

            <div>
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="contraseña" placeholder="Crea una contraseña" required minlength="4" />
            </div>

            <div>
                <label for="contraseña-confirm">Confirmar contraseña</label>
                <input type="password" id="contraseña-confirm" name="contraseña-confirm" placeholder="Repite tu contraseña" required minlength="4" />
            </div>

            <div>
                <label for="edad">Edad (opcional)</label>
                <input type="number" id="edad" name="edad" placeholder="Tu edad" min="1" max="120" />
            </div>

            <p id="error-registro"></p>
            <p id="exito-registro">¡Cuenta creada! Redirigiendo...</p>

            <button type="submit" id="btn-registro">Registrarse</button>
        </form>

        <p>¿Ya tienes cuenta?<a href="#" id="link-login">Inicia sesión</a></p>
    </main>

    <!-- Toast Notification -->
    <div id="registro-toast" class="toast-notification">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span class="toast-message" id="toast-message"></span>
    </div>

    <script src="../js/theme-manager.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>
