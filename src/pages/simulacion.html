<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación - Learning PC</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/user-settings.js"></script>
    <style>
        .main-content {
            padding: 0 !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            height: 100vh !important;
            width: 100% !important;
            overflow: hidden !important;
            background: #000;
        }

        .dashboard {
            display: block !important;
            grid-template-columns: none !important;
            padding: 0 !important;
            margin: 0 !important;
            height: 100vh !important;
            width: 100vw !important;
            overflow: hidden !important;
        }

        .simulacion-toolbar {
            background: var(--card-bg);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-color);
            gap: 16px;
            flex-shrink: 0;
        }

        .toolbar-left, .toolbar-center, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #simulacion-container {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        .btn-simulacion {
            background: var(--accent-solid);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--duration-fast) var(--ease-fluent);
        }

        .btn-simulacion:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-simulacion:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(1);
        }

        .level-indicator {
            background: var(--hover-bg);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
        }

        .level-indicator strong {
            color: var(--accent-solid);
        }

        .nivel-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--elevation-4);
            min-width: 240px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            padding: 8px;
            animation: fadeIn var(--duration-fast) var(--ease-fluent);
        }

        .dropdown-menu.visible {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-color);
            transition: background var(--duration-fast) var(--ease-fluent);
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            white-space: nowrap;
        }

        .dropdown-item:hover {
            background: var(--hover-bg);
        }
        
        .dropdown-item.active {
            background: var(--accent-pastel);
            color: var(--accent-solid);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #subcat-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        #subcat-modal.open { display: flex; }
        #subcat-modal .subcat-modal-box {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            min-width: 380px;
            max-width: 440px;
            text-align: center;
            box-shadow: var(--elevation-4);
            border: 1px solid var(--border-color);
        }
        #subcat-modal h3 {
            color: var(--text-color);
            font-size: 20px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }
        #subcat-modal p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 24px 0;
            line-height: 1.6;
        }
        #subcat-modal .subcat-btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        #subcat-modal button {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-fluent);
        }
        #subcat-modal .subcat-btn-primary {
            background: var(--accent-solid);
            color: white;
        }
        #subcat-modal .subcat-btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        #subcat-modal .subcat-btn-secondary {
            background: var(--hover-bg);
            color: var(--text-color);
        }
        #subcat-modal .subcat-btn-secondary:hover { 
            background: var(--border-color);
        }
        #subcat-modal .subcat-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        #subcat-modal .subcat-remember input { 
            width: 18px; 
            height: 18px; 
            cursor: pointer;
            accent-color: var(--accent-solid);
        }
        #subcat-modal .subcat-remember label { 
            color: var(--text-secondary); 
            font-size: 12px; 
            cursor: pointer; 
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Main Content -->
        <main class="main-content">
            <div class="simulacion-toolbar">
                <!-- Izquierda: Volver -->
                <div class="toolbar-left">
                    <button class="btn-simulacion btn-volver" id="btn-volver" title="Volver al menú" onclick="confirmarSalida('home')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Volver
                    </button>
                    <h2 id="titulo-nivel">Cargando...</h2>
                </div>

                <!-- Centro: Navegación de niveles -->
                <div class="toolbar-center">
                    <button class="btn-simulacion btn-anterior" id="btn-anterior" title="Nivel anterior">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    
                    <div class="level-indicator">
                        Nivel <strong id="nivel-actual">1</strong> de <span id="nivel-total">3</span>
                    </div>
                    
                    <button class="btn-simulacion btn-siguiente" id="btn-siguiente" title="Siguiente nivel">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>

                    <div class="nivel-dropdown">
                        <button class="btn-simulacion btn-nivel-menu" id="btn-nivel-menu" title="Ver todos los niveles">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <div class="dropdown-menu" id="dropdown-niveles">
                            <!-- Se llena dinámicamente -->
                        </div>
                    </div>
                </div>

                <!-- Derecha: Acciones -->
                <div class="toolbar-right">
                    <button class="btn-simulacion" style="background: var(--hover-bg); color: var(--text-color);" onclick="confirmarSalida('reportes')" title="Ver Reportes">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                    </button>
                    <button class="btn-simulacion" style="background: var(--hover-bg); color: var(--text-color);" onclick="confirmarSalida('ajustes')" title="Ajustes">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <div style="width: 1px; height: 24px; background: var(--border-color); margin: 0 4px;"></div>
                    <button class="btn-simulacion" id="btn-toggle-theme" title="Cambiar tema">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button class="btn-simulacion" id="btn-fullscreen" title="Pantalla completa">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                    </button>
                    <button class="btn-simulacion" id="btn-completar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Completar
                    </button>
                </div>
            </div>

            <iframe id="simulacion-container" src=""></iframe>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="feedback-toast" class="toast-notification">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span class="toast-message" id="toast-message"></span>
    </div>



    <!-- Subcategory continuation modal -->
    <div id="subcat-modal">
        <div class="subcat-modal-box">
            <h3>Continuar con la siguiente subcategoría?</h3>
            <p>Has completado todos los niveles de esta subcategoría.<br>¿Deseas continuar con la siguiente?</p>
            <div class="subcat-btn-row">
                <button class="subcat-btn-primary" onclick="continuarSiguienteSubcat()">Continuar</button>
                <button class="subcat-btn-secondary" onclick="cerrarSubcatModal()">Cancelar</button>
            </div>
            <div class="subcat-remember">
                <input type="checkbox" id="subcat-no-preguntar"/>
                <label for="subcat-no-preguntar">Pasar automáticamente la próxima vez</label>
            </div>
        </div>
    </div>

    <script src="../js/theme-manager.js"></script>
    <script>
        // Datos del nivel actual
        let idNivel = sessionStorage.getItem('simulacion_id');
        let rutaArchivo = sessionStorage.getItem('simulacion_ruta');
        let titulo = sessionStorage.getItem('simulacion_titulo');
        let idSubcategoria = sessionStorage.getItem('simulacion_id_subcategoria');
        let idCategoria = null; // Se obtiene al cargar niveles

        // Datos de niveles
        let niveles = [];
        let nivelActualIndex = 0;
        let subcatNavDone = false;

        // Elementos del DOM
        const tituloEl = document.getElementById('titulo-nivel');
        const nivelActualEl = document.getElementById('nivel-actual');
        const nivelTotalEl = document.getElementById('nivel-total');
        const btnAnterior = document.getElementById('btn-anterior');
        const btnSiguiente = document.getElementById('btn-siguiente');
        const btnMenu = document.getElementById('btn-nivel-menu');
        const dropdown = document.getElementById('dropdown-niveles');
        const iframe = document.getElementById('simulacion-container');
        const toast = document.getElementById('feedback-toast');

        // Inicializar
        async function init() {
            console.log('=== INICIO SIMULACION ===');
            
            tituloEl.textContent = titulo || 'Simulación';
            
            if (!idSubcategoria) {
                cargarSimulacion();
                return;
            }

            await cargarNiveles();
        }


        async function cargarNiveles() {
            try {
                console.log('Cargando niveles para subcategoria:', idSubcategoria);
                const nivelesData = await window.api.getNivelesPorSubcategoria(parseInt(idSubcategoria));
                
                console.log('Datos recibidos - tipo:', typeof nivelesData);
                console.log('Datos recibidos:', nivelesData);
                
                if (!nivelesData) {
                    console.log('API devolvió null, usando modo legacy');
                    niveles = [];
                    cargarSimulacion();
                    return;
                }
                
                if (Array.isArray(nivelesData)) {
                    niveles = nivelesData;
                    if (niveles.length > 0 && niveles[0].categoria_id !== undefined && niveles[0].categoria_id !== null) {
                        idCategoria = niveles[0].categoria_id;
                        console.log('[DEBUG] idCategoria desde categoria_id (array):', idCategoria);
                    } else if (niveles.length > 0 && niveles[0].id_categoria !== undefined && niveles[0].id_categoria !== null) {
                        idCategoria = niveles[0].id_categoria;
                        console.log('[DEBUG] idCategoria desde id_categoria (array):', idCategoria);
                    }
                    if (!idCategoria) {
                        console.log('[DEBUG] idCategoria sigue null, intentaremos obtener desde getSubcategoria');
                    }
                } else if (nivelesData.niveles) {
                    niveles = nivelesData.niveles;
                    if (niveles.length > 0 && niveles[0].categoria_id !== undefined && niveles[0].categoria_id !== null) {
                        idCategoria = niveles[0].categoria_id;
                        console.log('[DEBUG] idCategoria desde categoria_id (object):', idCategoria);
                    } else if (niveles.length > 0 && niveles[0].id_categoria !== undefined && niveles[0].id_categoria !== null) {
                        idCategoria = niveles[0].id_categoria;
                        console.log('[DEBUG] idCategoria desde id_categoria (object):', idCategoria);
                    }
                    if (!idCategoria) {
                        console.log('[DEBUG] idCategoria sigue null, intentaremos obtener desde getSubcategoria');
                    }
                } else {
                    console.log('Formato inesperado, usando modo legacy');
                    niveles = [];
                }
                
                // Fallback: si idCategoria sigue null, obtenerlo desde la subcategoría directamente
                if (!idCategoria && idSubcategoria) {
                    try {
                        const subcat = await window.api.getSubcategoria(parseInt(idSubcategoria));
                        if (subcat && subcat.id_categoria !== undefined && subcat.id_categoria !== null) {
                            idCategoria = subcat.id_categoria;
                            console.log('[DEBUG] idCategoria obtenido desde getSubcategoria:', idCategoria, '(subcat:', subcat.nombre, ')');
                        } else {
                            console.log('[DEBUG] getSubcategoria no devolvió id_categoria válido:', subcat);
                        }
                    } catch(e) {
                        console.log('[DEBUG] Fallback getSubcategoria falló:', e);
                    }
                }
                
                console.log('Niveles asignados:', niveles.length);
                
                if (niveles.length > 0) {
                    // Log de cada nivel
                    niveles.forEach((n, i) => {
                        console.log(`Nivel ${i+1}: id=${n.id_nivel}, titulo=${n.titulo}, ruta=${n.ruta_archivo}`);
                    });
                    
                    nivelActualIndex = niveles.findIndex(n => n.id_nivel == idNivel);
                    console.log('Index del nivel actual:', nivelActualIndex);
                    
                    if (nivelActualIndex === -1) nivelActualIndex = 0;

                    actualizarUI();
                    cargarSimulacion();
                    generarDropdown();
                } else {
                    console.log('Array vacío, modo legacy');
                    cargarSimulacion();
                }
            } catch (err) {
                console.error('ERROR:', err);
                niveles = [];
                cargarSimulacion();
            }
        }

function actualizarUI() {
            const total = niveles.length;
            nivelActualEl.textContent = nivelActualIndex + 1;
            nivelTotalEl.textContent = total;

            // Actualizar botones
            btnAnterior.disabled = nivelActualIndex === 0;
            btnSiguiente.disabled = nivelActualIndex === total - 1;
            
            // Si es el último nivel, cambiar icono del botón siguiente a Check
            if (nivelActualIndex === total - 1) {
                btnSiguiente.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
                btnSiguiente.title = '¡Has completado todos los niveles!';
            } else {
                btnSiguiente.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>';
                btnSiguiente.title = 'Siguiente nivel';
            }
        }

        async function cargarSimulacion() {
            console.log('=== CARGAR SIMULACION ===');
            
            // Determinar qué nivel usar
            let nivel = null;
            let ruta = '';
            let tit = '';
            
            if (niveles.length > 0 && nivelActualIndex < niveles.length) {
                nivel = niveles[nivelActualIndex];
                ruta = nivel.ruta_archivo || '';
                tit = nivel.titulo || '';
                console.log('Usando nivel del array:', nivel);
            } else {
                // Modo legacy desde sessionStorage
                ruta = rutaArchivo || '';
                tit = titulo || '';
                console.log('Modo legacy - ruta:', ruta, 'titulo:', tit);
            }
            
            console.log('Ruta final:', ruta);
            
            if (ruta && ruta !== 'null' && ruta !== '') {
                tituloEl.textContent = tit;

                // Normalizar la ruta: eliminar prefijos relativos (../../) que
                // pudo haber insertado una migración anterior en main.js
                let rutaNormalizada = ruta.replace(/^\.\.\/\.\.\//g, '');

                // Si aún no empieza con 'contenido/', agregarlo
                if (!rutaNormalizada.startsWith('contenido/')) {
                    rutaNormalizada = 'contenido/' + rutaNormalizada;
                }

                // Construir URL file:// absoluta usando el appPath del proceso principal
                const appPath = (await window.api.getAppPath()).replace(/\\/g, '/');
                const rutaAbsoluta = 'file:///' + appPath + '/' + rutaNormalizada;

                console.log('Iframe src:', rutaAbsoluta);
                iframe.src = rutaAbsoluta;
            } else {
                tituloEl.textContent = '⚠️ Simulación no disponible';
                console.log('NO HAY RUTA - mostrando mensaje');
            }
        }

        function generarDropdown() {
            console.log('[SIMULACION] Generando dropdown con', niveles.length, 'niveles');
            dropdown.innerHTML = '';
            
            niveles.forEach((nivel, index) => {
                const item = document.createElement('div');
                item.className = 'dropdown-item' + (index === nivelActualIndex ? ' active' : '');
                item.innerHTML = `<span class="nivel-num">${index + 1}</span> ${nivel.titulo}`;
                item.onclick = () => {
                    console.log('[SIMULACION] Click en nivel:', index, nivel.titulo);
                    irANivel(index);
                };
                dropdown.appendChild(item);
            });
        }

        function irANivel(index) {
            if (index < 0 || index >= niveles.length) {
                console.log('[SIMULACION] Índice fuera de rango:', index);
                return;
            }
            
            console.log('[SIMULACION] Ir a nivel:', index);
            nivelActualIndex = index;
            const nivel = niveles[index];
            
            // Actualizar sessionStorage
            sessionStorage.setItem('simulacion_id', nivel.id_nivel);
            sessionStorage.setItem('simulacion_ruta', nivel.ruta_archivo);
            sessionStorage.setItem('simulacion_titulo', nivel.titulo);
            
            // Recargar variables locales
            idNivel = nivel.id_nivel;
            rutaArchivo = nivel.ruta_archivo;
            titulo = nivel.titulo;
            
            actualizarUI();
            cargarSimulacion();
            generarDropdown();
            
            mostrarToast('Nivel ' + (index + 1) + ': ' + nivel.titulo);
            cerrarDropdown();
        }

        function nivelAnterior() {
            console.log('[SIMULACION] nivelAnterior - actual:', nivelActualIndex);
            if (nivelActualIndex > 0) {
                irANivel(nivelActualIndex - 1);
            }
        }

        function nivelSiguiente() {
            console.log('[SIMULACION] nivelSiguiente - actual:', nivelActualIndex, 'total:', niveles.length);
            if (nivelActualIndex < niveles.length - 1) {
                irANivel(nivelActualIndex + 1);
            } else {
                mostrarToast('¡Has completado todos los niveles!', 'exito');
            }
        }

        function toggleDropdown() {
            dropdown.classList.toggle('visible');
        }

        function cerrarDropdown() {
            dropdown.classList.remove('visible');
        }

        function confirmarSalida(destino) {
            if (confirm("¿Deseas salir de la simulación?")) {
                sessionStorage.removeItem('simulacion_id');
                sessionStorage.removeItem('simulacion_ruta');
                sessionStorage.removeItem('simulacion_titulo');
                sessionStorage.removeItem('simulacion_id_subcategoria');
                window.api.irA(destino);
            }
        }

        function mostrarToast(mensaje, tipo = '') {
            const toast = document.getElementById('feedback-toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = toast.querySelector('.toast-icon');
            
            toastMessage.textContent = mensaje;
            
            // Remover clases anteriores
            toast.classList.remove('toast-notification', 'success', 'error', 'info', 'visible');
            
            // Agregar clase base y tipo
            toast.classList.add('toast-notification');
            if (tipo === 'exito') {
                toast.classList.add('success');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
            } else if (tipo === 'error') {
                toast.classList.add('error');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
            } else {
                toast.classList.add('info');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>';
            }
            
            // Mostrar
            requestAnimationFrame(() => {
                toast.classList.add('visible');
            });
            
            // Ocultar después de 2.5s
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 2500);
        }

        // Event Listeners con debugging
        document.getElementById('btn-volver').onclick = () => {
            console.log('[SIMULACION] Botón volver clickeado');
            sessionStorage.removeItem('simulacion_id');
            sessionStorage.removeItem('simulacion_ruta');
            sessionStorage.removeItem('simulacion_titulo');
            sessionStorage.removeItem('simulacion_id_subcategoria');
            window.api.irA('home');
        };

        // Agregar event listeners con debugging
        btnAnterior.onclick = () => {
            console.log('[SIMULACION] Click btn-anterior');
            nivelAnterior();
        };
        btnSiguiente.onclick = () => {
            console.log('[SIMULACION] Click btn-siguiente');
            nivelSiguiente();
        };
        btnMenu.onclick = () => {
            console.log('[SIMULACION] Click btn-menu');
            toggleDropdown();
        };

        // Cerrar dropdown al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!btnMenu.contains(e.target) && !dropdown.contains(e.target)) {
                cerrarDropdown();
            }
        });

        // Completar nivel
        document.getElementById('btn-completar').onclick = async () => {
            await completarNivelYAvanzar();
        };

        // Función para completar nivel desde iframe (auto-completar)
        async function completarNivelYAvanzar() {
            console.log('[SIMUL] completarNivelYAvanzar() llamado');
            console.log('[SIMUL] subcatNavDone:', subcatNavDone);
            console.log('[SIMUL] idNivel:', idNivel);
            console.log('[SIMUL] nivelActualIndex:', nivelActualIndex, 'niveles.length:', niveles.length);
            
            if (subcatNavDone) {
                console.log('[SIMUL] Ya completado, saliendo');
                return false;
            }
            
            const usuarioStr = sessionStorage.getItem('usuario');
            console.log('[SIMUL] usuario en sessionStorage:', usuarioStr ? 'existe' : 'null');
            
            if (!usuarioStr) {
                console.error('[SIMUL] No hay usuario, intentando con datos del nivel');
                // Intentar marcar de todas formas con datos mínimos
                if (idNivel) {
                    console.log('[SIMUL] Intentando marcar nivel con idNivel:', idNivel);
                    mostrarToast('Completando nivel...', 'info');
                    setTimeout(() => {
                        if (nivelActualIndex < niveles.length - 1) {
                            nivelSiguiente();
                        } else {
                            subcatNavDone = true;
                            abrirSubcatModal();
                        }
                    }, 1500);
                    return true;
                }
                return false;
            }
            
            const usuario = JSON.parse(usuarioStr);
            if (usuario && idNivel) {
                console.log('[SIMUL] Llamando API marcarNivelCompletado');
                const resultado = await window.api.marcarNivelCompletado(usuario.id_usuario, parseInt(idNivel));
                console.log('[SIMUL] Resultado API:', resultado);
                
                if (resultado && resultado.ok) {
                    mostrarToast('¡Nivel completado! Progreso: ' + resultado.progreso_total + '%', 'exito');
                    
                    setTimeout(async () => {
                        console.log('[SIMUL] Timeout completado, verificando siguiente nivel');
                        if (nivelActualIndex < niveles.length - 1) {
                            console.log('[SIMUL] Hay más niveles, avanzando');
                            nivelSiguiente();
                        } else {
                            console.log('[SIMUL] Es el último nivel, mostrando modal');
                            subcatNavDone = true;
                            const autoEnabled = window.LearningPCSettings && window.LearningPCSettings.isAutoContinueEnabled();
                            console.log('[SIMUL] autoEnabled:', autoEnabled);
                            if (autoEnabled) {
                                await continuarSiguienteSubcat();
                            } else {
                                const showPrompt = window.LearningPCSettings ? window.LearningPCSettings.shouldShowPrompt() : true;
                                if (showPrompt) {
                                    abrirSubcatModal();
                                } else {
                                    // Si no hay auto-continue y no hay prompt, solo avisamos
                                    mostrarToast('¡Has completado todos los niveles de esta subcategoría!', 'exito');
                                }
                            }
                        }
                    }, 1500);
                    return true;
                } else {
                    console.error('[SIMUL] API marcó error:', resultado);
                }
            }
            return false;
        }

        function abrirSubcatModal() {
            const modal = document.getElementById('subcat-modal');
            if (modal) modal.classList.add('open');
        }

        function cerrarSubcatModal() {
            const modal = document.getElementById('subcat-modal');
            if (modal) modal.classList.remove('open');
            sessionStorage.removeItem('simulacion_id');
            sessionStorage.removeItem('simulacion_ruta');
            sessionStorage.removeItem('simulacion_titulo');
            sessionStorage.removeItem('simulacion_id_subcategoria');
            window.api.irA('home');
        }

        async function continuarSiguienteSubcat() {
            const remember = document.getElementById('subcat-no-preguntar');
            if (remember && remember.checked) {
                if (window.LearningPCSettings) {
                    window.LearningPCSettings.setAutoContinue(true);
                }
            }

            const modal = document.getElementById('subcat-modal');
            if (modal) modal.classList.remove('open');

            console.log('[SUBNAV] continuarSiguienteSubcat() iniciado');
            console.log('[SUBNAV] idCategoria actual:', idCategoria);
            console.log('[SUBNAV] idSubcategoria actual:', idSubcategoria);

            // Fallback: si idCategoria es null, intentar obtenerlo desde la subcategoría
            if (!idCategoria && idSubcategoria) {
                try {
                    const subcat = await window.api.getSubcategoria(parseInt(idSubcategoria));
                    if (subcat && subcat.id_categoria !== undefined && subcat.id_categoria !== null) {
                        idCategoria = subcat.id_categoria;
                        console.log('[SUBNAV] Fallback exitoso - idCategoria obtenido:', idCategoria);
                    } else {
                        console.log('[SUBNAV] Fallback getSubcategoria no devolvió id_categoria:', subcat);
                    }
                } catch(e) {
                    console.log('[SUBNAV] Fallback getSubcategoria falló:', e);
                }
            }

            if (!idCategoria) {
                console.error('[SUBNAV] ERROR: idCategoria es null, imposible continuar');
                mostrarToast('ERROR: No se pudo determinar la categoría. Volviendo al menú.', 'error');
                setTimeout(() => window.api.irA('home'), 2000);
                return;
            }

            try {
                // Obtener todas las subcategorías ordenadas
                const subcats = await window.api.getSubcategoriasPorCategoria(idCategoria);
                console.log('[SUBNAV] Subcategorías obtenidas:', subcats.length);
                
                if (!subcats || subcats.length === 0) {
                    console.warn('[SUBNAV] No hay subcategorías para esta categoría');
                    mostrarToast('No hay más subcategorías en esta categoría.', 'info');
                    setTimeout(() => window.api.irA('home'), 1500);
                    return;
                }

                // Encontrar el índice de la subcategoría actual
                const currentIdx = subcats.findIndex(s => s.id_subcategoria == idSubcategoria);
                console.log('[SUBNAV] Índice actual:', currentIdx, 'de', subcats.length);
                let nextIdx = currentIdx + 1;
                let siguiente = null;
                let nivelesSig = null;

                // Buscar la siguiente subcategoría que tenga niveles disponibles
                while (nextIdx < subcats.length) {
                    siguiente = subcats[nextIdx];
                    nivelesSig = await window.api.getNivelesPorSubcategoria(siguiente.id_subcategoria);
                    
                    if (nivelesSig && nivelesSig.length > 0) {
                        break; // Encontramos una subcategoría con contenido
                    }
                    console.log(`[SUBNAV] Subcategoría "${siguiente.nombre}" vacía, saltando...`);
                    nextIdx++;
                }

                if (nextIdx >= subcats.length || !nivelesSig || nivelesSig.length === 0) {
                    // No hay siguiente subcategoría válida
                    console.log('[SUBNAV] No hay siguiente subcategoría con niveles');
                    mostrarToast('¡Has completado todas las subcategorías de esta sección!', 'exito');
                    setTimeout(() => window.api.irA('home'), 1500);
                    return;
                }

                console.log('[SUBNAV] Siguiente subcategoría válida:', siguiente.nombre, 'ID:', siguiente.id_subcategoria);
                console.log('[SUBNAV] Niveles encontrados:', nivelesSig.length);

                const primerNivel = nivelesSig[0];
                console.log('[SUBNAV] Primer nivel:', primerNivel.titulo, 'Ruta:', primerNivel.ruta_archivo);

                // Actualizar sessionStorage con el primer nivel de la siguiente subcategoría
                sessionStorage.setItem('simulacion_id', primerNivel.id_nivel);
                sessionStorage.setItem('simulacion_ruta', primerNivel.ruta_archivo);
                sessionStorage.setItem('simulacion_titulo', primerNivel.titulo);
                sessionStorage.setItem('simulacion_id_subcategoria', siguiente.id_subcategoria);

                console.log('[SUBNAV] Navegando a:', siguiente.nombre, '->', primerNivel.titulo);
                
                // Mostrar feedback y luego recargar
                mostrarToast('Avanzando a: ' + siguiente.nombre, 'info');
                setTimeout(() => {
                    window.location.reload();
                }, 2000);

            } catch(e) {
                console.error('[SUBNAV] Error completo:', e);
                mostrarToast('Error al continuar: ' + e.message, 'error');
                setTimeout(() => window.api.irA('home'), 2000);
            }
        }

        // Exponer función global para auto-completar desde iframe
        window.completarNivelYAvanzar = completarNivelYAvanzar;
        window.irASiguienteNivel = function() {
            if (nivelActualIndex < niveles.length - 1) {
                nivelSiguiente();
            }
        };

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                nivelAnterior();
            } else if (e.key === 'ArrowRight') {
                nivelSiguiente();
            } else if (e.key === 'Escape') {
                document.getElementById('btn-volver').click();
            }
        });

        // Iniciar
        init();
    </script>
</body>

</html>
