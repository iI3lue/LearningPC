<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación - Learning PC</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
        }

        .simulacion-toolbar {
            background: #1a1a1a;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #333;
            gap: 16px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-simulacion {
            background: #0078d4;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn-simulacion:hover {
            background: #1084d8;
        }

        .btn-simulacion:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-simulacion:disabled:hover {
            background: #0078d4;
        }

        .btn-volver {
            background: #333;
            font-size: 12px;
            padding: 8px 12px;
        }

        .btn-volver:hover {
            background: #444;
        }

        .btn-anterior, .btn-siguiente {
            background: #2d2d2d;
            padding: 8px 12px;
            font-size: 16px;
        }

        .btn-anterior:hover, .btn-siguiente:hover {
            background: #3d3d3d;
        }

        .level-indicator {
            background: #252525;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            color: #ccc;
            min-width: 80px;
            text-align: center;
        }

        .level-indicator strong {
            color: #60cdff;
        }

        /* Dropdown de niveles */
        .nivel-dropdown {
            position: relative;
        }

        .btn-nivel-menu {
            background: #2d2d2d;
            padding: 8px 12px;
            font-size: 14px;
            min-width: 32px;
        }

        .btn-nivel-menu:hover {
            background: #3d3d3d;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 8px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 0;
            min-width: 200px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .dropdown-menu.visible {
            display: block;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .dropdown-item {
            padding: 10px 16px;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
        }

        .dropdown-item:hover {
            background: #3d3d3d;
        }

        .dropdown-item.active {
            background: #0078d4;
            color: #fff;
        }

        .dropdown-item.completado::before {
            content: '✓';
            color: #6ccb5f;
            font-size: 12px;
        }

        .dropdown-item .nivel-num {
            background: #444;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            min-width: 24px;
            text-align: center;
        }

        .dropdown-item.active .nivel-num {
            background: rgba(255,255,255,0.2);
        }

        /* Título del nivel */
        #titulo-nivel {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            margin: 0;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #simulacion-container {
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
        }

        /* Feedback toast - usando clases de styles.css */
        #feedback-toast {
            /* Ahora usa las clases .toast-notification de styles.css */
        }

        #feedback-toast.visible {
            /* Animación manejada por .toast-notification.visible */
        }

        #feedback-toast.exito {
            /* Color manejado por .toast-notification.success */
        }

        /* Keyboard hint */
        .keyboard-hint {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: #888;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            gap: 12px;
        }

        .keyboard-hint kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #aaa;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="simulacion-toolbar">
        <!-- Izquierda: Volver -->
        <div class="toolbar-left">
            <button class="btn-simulacion btn-volver" id="btn-volver" title="Volver al menú">
                ← Volver
            </button>
            <h2 id="titulo-nivel">Cargando...</h2>
        </div>

        <!-- Centro: Navegación de niveles -->
        <div class="toolbar-center">
            <button class="btn-simulacion btn-anterior" id="btn-anterior" title="Nivel anterior">
                ←
            </button>
            
            <div class="level-indicator">
                Nivel <strong id="nivel-actual">1</strong> de <span id="nivel-total">3</span>
            </div>
            
            <button class="btn-simulacion btn-siguiente" id="btn-siguiente" title="Siguiente nivel">
                →
            </button>

            <div class="nivel-dropdown">
                <button class="btn-simulacion btn-nivel-menu" id="btn-nivel-menu" title="Ver todos los niveles">
                    ☰
                </button>
                <div class="dropdown-menu" id="dropdown-niveles">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>
        </div>

        <!-- Derecha: Completar y Home -->
        <div class="toolbar-right">
            <button class="btn-simulacion" id="btn-completar">
                ✓ Completar
            </button>
        </div>
    </div>

    <iframe id="simulacion-container" src=""></iframe>
    
    <!-- Toast Notification - usando clases de styles.css -->
    <div id="feedback-toast" class="toast-notification">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span class="toast-message" id="toast-message"></span>
    </div>

    <div class="keyboard-hint">
        <span><kbd>←</kbd> <kbd>→</kbd> Navegar</span>
        <span><kbd>Esc</kbd> Salir</span>
    </div>

    <script>
        // Datos del nivel actual
        let idNivel = sessionStorage.getItem('simulacion_id');
        let rutaArchivo = sessionStorage.getItem('simulacion_ruta');
        let titulo = sessionStorage.getItem('simulacion_titulo');
        let idSubcategoria = sessionStorage.getItem('simulacion_id_subcategoria');

        // Datos de niveles
        let niveles = [];
        let nivelActualIndex = 0;

        // Elementos del DOM
        const tituloEl = document.getElementById('titulo-nivel');
        const nivelActualEl = document.getElementById('nivel-actual');
        const nivelTotalEl = document.getElementById('nivel-total');
        const btnAnterior = document.getElementById('btn-anterior');
        const btnSiguiente = document.getElementById('btn-siguiente');
        const btnMenu = document.getElementById('btn-nivel-menu');
        const dropdown = document.getElementById('dropdown-niveles');
        const iframe = document.getElementById('simulacion-container');
        const toast = document.getElementById('feedback-toast');

        // Inicializar
        async function init() {
            console.log('=== INICIO SIMULACION ===');
            console.log('idNivel:', idNivel);
            console.log('rutaArchivo:', rutaArchivo);
            console.log('titulo:', titulo);
            console.log('idSubcategoria:', idSubcategoria);
            
            tituloEl.textContent = titulo || 'Simulación';
            
            if (!idSubcategoria) {
                console.log('MODO LEGACY: No hay idSubcategoria, usando rutaArchivo directamente');
                // Forzar modo legacy
                niveles = [];
                cargarSimulacion();
                return;
            }

            await cargarNiveles();
        }

        async function cargarNiveles() {
            try {
                console.log('Cargando niveles para subcategoria:', idSubcategoria);
                const nivelesData = await window.api.getNivelesPorSubcategoria(parseInt(idSubcategoria));
                
                console.log('Datos recibidos - tipo:', typeof nivelesData);
                console.log('Datos recibidos:', nivelesData);
                
                if (!nivelesData) {
                    console.log('API devolvió null, usando modo legacy');
                    niveles = [];
                    cargarSimulacion();
                    return;
                }
                
                if (Array.isArray(nivelesData)) {
                    niveles = nivelesData;
                } else if (nivelesData.niveles) {
                    niveles = nivelesData.niveles;
                } else {
                    console.log('Formato inesperado, usando modo legacy');
                    niveles = [];
                }
                
                console.log('Niveles asignados:', niveles.length);
                
                if (niveles.length > 0) {
                    // Log de cada nivel
                    niveles.forEach((n, i) => {
                        console.log(`Nivel ${i+1}: id=${n.id_nivel}, titulo=${n.titulo}, ruta=${n.ruta_archivo}`);
                    });
                    
                    nivelActualIndex = niveles.findIndex(n => n.id_nivel == idNivel);
                    console.log('Index del nivel actual:', nivelActualIndex);
                    
                    if (nivelActualIndex === -1) nivelActualIndex = 0;

                    actualizarUI();
                    cargarSimulacion();
                    generarDropdown();
                } else {
                    console.log('Array vacío, modo legacy');
                    cargarSimulacion();
                }
            } catch (err) {
                console.error('ERROR:', err);
                niveles = [];
                cargarSimulacion();
            }
        }

function actualizarUI() {
            const total = niveles.length;
            nivelActualEl.textContent = nivelActualIndex + 1;
            nivelTotalEl.textContent = total;

            // Actualizar botones
            btnAnterior.disabled = nivelActualIndex === 0;
            btnSiguiente.disabled = nivelActualIndex === total - 1;
            
            // Si es el último nivel, cambiar texto del botón siguiente
            if (nivelActualIndex === total - 1) {
                btnSiguiente.textContent = '✓';
                btnSiguiente.title = '¡Has completado todos los niveles!';
            } else {
                btnSiguiente.textContent = '→';
                btnSiguiente.title = 'Siguiente nivel';
            }
        }

        async function cargarSimulacion() {
            console.log('=== CARGAR SIMULACION ===');
            
            // Determinar qué nivel usar
            let nivel = null;
            let ruta = '';
            let tit = '';
            
            if (niveles.length > 0 && nivelActualIndex < niveles.length) {
                nivel = niveles[nivelActualIndex];
                ruta = nivel.ruta_archivo || '';
                tit = nivel.titulo || '';
                console.log('Usando nivel del array:', nivel);
            } else {
                // Modo legacy desde sessionStorage
                ruta = rutaArchivo || '';
                tit = titulo || '';
                console.log('Modo legacy - ruta:', ruta, 'titulo:', tit);
            }
            
            console.log('Ruta final:', ruta);
            
            if (ruta && ruta !== 'null' && ruta !== '') {
                tituloEl.textContent = tit;

                // Normalizar la ruta: eliminar prefijos relativos (../../) que
                // pudo haber insertado una migración anterior en main.js
                let rutaNormalizada = ruta.replace(/^\.\.\/\.\.\//g, '');

                // Si aún no empieza con 'contenido/', agregarlo
                if (!rutaNormalizada.startsWith('contenido/')) {
                    rutaNormalizada = 'contenido/' + rutaNormalizada;
                }

                // Construir URL file:// absoluta usando el appPath del proceso principal
                const appPath = (await window.api.getAppPath()).replace(/\\/g, '/');
                const rutaAbsoluta = 'file:///' + appPath + '/' + rutaNormalizada;

                console.log('Iframe src:', rutaAbsoluta);
                iframe.src = rutaAbsoluta;
            } else {
                tituloEl.textContent = '⚠️ Simulación no disponible';
                console.log('NO HAY RUTA - mostrando mensaje');
            }
        }

        function generarDropdown() {
            console.log('[SIMULACION] Generando dropdown con', niveles.length, 'niveles');
            dropdown.innerHTML = '';
            
            niveles.forEach((nivel, index) => {
                const item = document.createElement('div');
                item.className = 'dropdown-item' + (index === nivelActualIndex ? ' active' : '');
                item.innerHTML = `<span class="nivel-num">${index + 1}</span> ${nivel.titulo}`;
                item.onclick = () => {
                    console.log('[SIMULACION] Click en nivel:', index, nivel.titulo);
                    irANivel(index);
                };
                dropdown.appendChild(item);
            });
        }

        function irANivel(index) {
            if (index < 0 || index >= niveles.length) {
                console.log('[SIMULACION] Índice fuera de rango:', index);
                return;
            }
            
            console.log('[SIMULACION] Ir a nivel:', index);
            nivelActualIndex = index;
            const nivel = niveles[index];
            
            // Actualizar sessionStorage
            sessionStorage.setItem('simulacion_id', nivel.id_nivel);
            sessionStorage.setItem('simulacion_ruta', nivel.ruta_archivo);
            sessionStorage.setItem('simulacion_titulo', nivel.titulo);
            
            // Recargar variables locales
            idNivel = nivel.id_nivel;
            rutaArchivo = nivel.ruta_archivo;
            titulo = nivel.titulo;
            
            actualizarUI();
            cargarSimulacion();
            generarDropdown();
            
            mostrarToast('Nivel ' + (index + 1) + ': ' + nivel.titulo);
            cerrarDropdown();
        }

        function nivelAnterior() {
            console.log('[SIMULACION] nivelAnterior - actual:', nivelActualIndex);
            if (nivelActualIndex > 0) {
                irANivel(nivelActualIndex - 1);
            }
        }

        function nivelSiguiente() {
            console.log('[SIMULACION] nivelSiguiente - actual:', nivelActualIndex, 'total:', niveles.length);
            if (nivelActualIndex < niveles.length - 1) {
                irANivel(nivelActualIndex + 1);
            } else {
                mostrarToast('¡Has completado todos los niveles!', 'exito');
            }
        }

        function toggleDropdown() {
            dropdown.classList.toggle('visible');
        }

        function cerrarDropdown() {
            dropdown.classList.remove('visible');
        }

        function mostrarToast(mensaje, tipo = '') {
            const toast = document.getElementById('feedback-toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = toast.querySelector('.toast-icon');
            
            toastMessage.textContent = mensaje;
            
            // Remover clases anteriores
            toast.classList.remove('toast-notification', 'success', 'error', 'info', 'visible');
            
            // Agregar clase base y tipo
            toast.classList.add('toast-notification');
            if (tipo === 'exito') {
                toast.classList.add('success');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
            } else if (tipo === 'error') {
                toast.classList.add('error');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
            } else {
                toast.classList.add('info');
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>';
            }
            
            // Mostrar
            requestAnimationFrame(() => {
                toast.classList.add('visible');
            });
            
            // Ocultar después de 2.5s
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 2500);
        }

        // Event Listeners con debugging
        document.getElementById('btn-volver').onclick = () => {
            console.log('[SIMULACION] Botón volver clickeado');
            sessionStorage.removeItem('simulacion_id');
            sessionStorage.removeItem('simulacion_ruta');
            sessionStorage.removeItem('simulacion_titulo');
            sessionStorage.removeItem('simulacion_id_subcategoria');
            window.api.irA('home');
        };

        // Agregar event listeners con debugging
        btnAnterior.onclick = () => {
            console.log('[SIMULACION] Click btn-anterior');
            nivelAnterior();
        };
        btnSiguiente.onclick = () => {
            console.log('[SIMULACION] Click btn-siguiente');
            nivelSiguiente();
        };
        btnMenu.onclick = () => {
            console.log('[SIMULACION] Click btn-menu');
            toggleDropdown();
        };

        // Cerrar dropdown al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!btnMenu.contains(e.target) && !dropdown.contains(e.target)) {
                cerrarDropdown();
            }
        });

        // Completar nivel
        document.getElementById('btn-completar').onclick = async () => {
            await completarNivelYAvanzar();
        };

        // Función para completar nivel desde iframe (auto-completar)
        async function completarNivelYAvanzar() {
            const usuario = JSON.parse(sessionStorage.getItem('usuario'));
            if (usuario && idNivel) {
                const resultado = await window.api.marcarNivelCompletado(usuario.id_usuario, parseInt(idNivel));
                if (resultado.ok) {
                    mostrarToast('¡Nivel completado! Progreso: ' + resultado.progreso_total + '%', 'exito');
                    
                    //auto-navegar al siguiente nivel
                    setTimeout(() => {
                        if (nivelActualIndex < niveles.length - 1) {
                            nivelSiguiente();
                        } else {
                            // Fin de la subcategoría
                            sessionStorage.removeItem('simulacion_id');
                            sessionStorage.removeItem('simulacion_ruta');
                            sessionStorage.removeItem('simulacion_titulo');
                            sessionStorage.removeItem('simulacion_id_subcategoria');
                            window.api.irA('home');
                        }
                    }, 1500);
                }
            }
        }

        // Exponer función global para auto-completar desde iframe
        window.completarNivelYAvanzar = completarNivelYAvanzar;
        window.irASiguienteNivel = function() {
            if (nivelActualIndex < niveles.length - 1) {
                nivelSiguiente();
            }
        };

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                nivelAnterior();
            } else if (e.key === 'ArrowRight') {
                nivelSiguiente();
            } else if (e.key === 'Escape') {
                document.getElementById('btn-volver').click();
            }
        });

        // Iniciar
        init();
    </script>
</body>

</html>
